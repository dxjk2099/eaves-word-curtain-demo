<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#e8ddc4">
  <meta name="description" content="檐下听雨——一幅可被风拨动的文字帘。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox='0%200%2016%2016'%3E%3Cpath%20fill='%238f5a18'%20d='M1%208h14v2H1z'/%3E%3Ccircle%20cx='8'%20cy='6'%20r='4'%20fill='%23d7a53a'/%3E%3C/svg%3E">
  <title>檐下听雨 · Words in Gravity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="artwork" aria-label="可拨动的檐下文字帘互动作品">
    <canvas id="scene" aria-hidden="true"></canvas>

    <header class="art-title">
      <span>檐下听雨</span>
      <small>WORDS IN GRAVITY</small>
    </header>

    <p class="gesture-hint">
      <span class="gesture-hint__line" aria-hidden="true"></span>
      划过文字，听风经过
    </p>

    <button class="sound-toggle" type="button" aria-pressed="false" hidden>
      <span class="sound-toggle__mark" aria-hidden="true"></span>
      <span data-sound-label>声音 开</span>
    </button>
    <div class="cursor-ring" aria-hidden="true"></div>
    <noscript>此作品需要启用 JavaScript。</noscript>
  </main>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
